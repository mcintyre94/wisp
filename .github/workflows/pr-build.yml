name: PR Build

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  build-and-distribute:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          AD_HOC_PROVISION_PROFILE_BASE64: ${{ secrets.AD_HOC_PROVISION_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Install certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          PP_PATH=$RUNNER_TEMP/ad_hoc.mobileprovision
          echo "$AD_HOC_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build and archive
        run: |
          xcodebuild archive \
            -scheme Wisp \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/Wisp.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM=79X2Z5TT45 \
            PROVISIONING_PROFILE_SPECIFIER="<your-ad-hoc-profile-name-or-uuid>"

      - name: Generate ExportOptions.plist
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Wisp.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Generate manifest.plist
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          IPA_URL="https://github.com/mcintyre94/wisp/releases/download/pr-${PR_NUMBER}/wisp.ipa"
          cat > $RUNNER_TEMP/manifest.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>${IPA_URL}</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>app.callum.wisp</string>
                  <key>bundle-version</key>
                  <string>1.0</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>Wisp</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          EOF

      - name: Create GitHub pre-release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Delete existing release if present (re-run on push)
          gh release delete "pr-${PR_NUMBER}" --cleanup-tag --yes 2>/dev/null || true

          # Find the exported IPA
          IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)

          # Create pre-release and upload assets
          gh release create "pr-${PR_NUMBER}" \
            --prerelease \
            --title "PR #${PR_NUMBER}" \
            --notes "Ad-hoc build for PR #${PR_NUMBER}" \
            "$IPA_PATH#wisp.ipa" \
            "$RUNNER_TEMP/manifest.plist#manifest.plist"

      - name: Post install link comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MANIFEST_URL="https://github.com/mcintyre94/wisp/releases/download/pr-${PR_NUMBER}/manifest.plist"
          INSTALL_URL="itms-services://?action=download-manifest&url=${MANIFEST_URL}"

          gh pr comment "${PR_NUMBER}" --body "## Install on device

          **[Tap here to install on your device](${INSTALL_URL})**

          > Requires your device UDID to be registered in the ad-hoc provisioning profile."
